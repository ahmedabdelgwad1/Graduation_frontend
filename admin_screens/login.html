<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - Bibliotheca Alexandrina</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&amp;family=Noto+Naskh+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#4d4637",
                        "on-surface": "#ebe1cf",
                        "inverse-on-surface": "#353023",
                        "on-secondary-fixed": "#1b1b20",
                        "error-container": "#93000a",
                        "inverse-surface": "#ebe1cf",
                        "secondary-fixed-dim": "#c8c5cd",
                        "on-primary-fixed-variant": "#584400",
                        "on-error-container": "#ffdad6",
                        "background": "#171308",
                        "surface": "#171308",
                        "secondary-container": "#49484e",
                        "on-surface-variant": "#d0c5b2",
                        "inverse-primary": "#755b00",
                        "on-tertiary": "#003737",
                        "surface-container-highest": "#393427",
                        "surface-bright": "#3e392c",
                        "tertiary-fixed-dim": "#93d2d1",
                        "primary-container": "#c9a84c",
                        "on-tertiary-container": "#004848",
                        "on-primary-fixed": "#241a00",
                        "surface-container-low": "#1f1b10",
                        "tertiary-container": "#78b6b6",
                        "surface-container-high": "#2e2a1d",
                        "on-secondary-fixed-variant": "#47464c",
                        "on-primary": "#3d2e00",
                        "tertiary-fixed": "#aeeeed",
                        "surface-tint": "#e6c364",
                        "surface-container-lowest": "#120e04",
                        "primary-fixed": "#ffe08f",
                        "primary": "#e6c364",
                        "on-tertiary-fixed-variant": "#004f50",
                        "tertiary": "#93d2d1",
                        "surface-container": "#241f13",
                        "primary-fixed-dim": "#e6c364",
                        "on-tertiary-fixed": "#002020",
                        "secondary-fixed": "#e4e1e9",
                        "on-secondary": "#303036",
                        "on-primary-container": "#503d00",
                        "secondary": "#c8c5cd",
                        "on-secondary-container": "#bab7be",
                        "on-background": "#ebe1cf",
                        "surface-dim": "#171308",
                        "outline": "#99907e",
                        "on-error": "#690005",
                        "surface-variant": "#393427",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "128px",
                        "gutter": "32px",
                        "unit": "8px",
                        "margin-page": "64px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "headline-md": ["Cinzel"],
                        "display-lg": ["Cinzel"],
                        "body-lg": ["Cormorant Garamond"],
                        "arabic-display": ["Noto Naskh Arabic"],
                        "label-sm": ["Cinzel"],
                        "body-md": ["Cormorant Garamond"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", { "lineHeight": "1.3", "letterSpacing": "0.1em", "fontWeight": "400" }],
                        "display-lg": ["64px", { "lineHeight": "1.1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "arabic-display": ["28px", { "lineHeight": "1.8", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.2em", "fontWeight": "700" }],
                        "body-md": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden text-on-surface">
<!-- Atmospheric Chiaroscuro Background Gradient -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-variant/40 via-background to-background pointer-events-none"></div>
<!-- Login Vitrine (Container) -->
<main class="relative z-10 w-full max-w-[480px] mx-4 p-12 bg-surface-container/80 backdrop-blur-[20px] border-t border-l border-primary/20 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.8)]">
<!-- Header / Logo -->
<header class="flex flex-col items-center justify-center mb-12 text-center">
<span class="material-symbols-outlined text-primary text-[48px] mb-6 opacity-90" style="font-variation-settings: 'wght' 200;">visibility</span>
<h1 class="font-headline-md text-headline-md text-on-surface mb-3 tracking-widest uppercase">Bibliotheca<br/>Alexandrina</h1>
<p class="font-label-sm text-label-sm text-primary tracking-[0.3em] uppercase opacity-80">Antiquities Registry</p>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-8" method="POST">
<!-- Input Group: Museum Email -->
<div class="relative group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary" for="email">Museum Email</label>
<input class="w-full bg-transparent border-0 border-b border-primary/40 focus:border-primary focus:ring-0 px-0 py-3 text-on-surface font-body-lg transition-colors placeholder:text-on-surface-variant/30" id="email" name="email" placeholder="scholar@alexandrina.gov.eg" required="" type="email"/>
</div>
<!-- Input Group: Security Key -->
<div class="relative group mb-4">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary" for="password">Security Key</label>
<input class="w-full bg-transparent border-0 border-b border-primary/40 focus:border-primary focus:ring-0 px-0 py-3 text-on-surface font-body-lg transition-colors placeholder:text-on-surface-variant/30 tracking-widest" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full py-5 border-2 border-primary bg-transparent text-primary font-label-sm text-label-sm uppercase tracking-[0.2em] hover:bg-primary hover:text-on-primary transition-all duration-300 mt-2" type="submit">
                Enter Sanctuary
            </button>
</form>
<!-- Footer Links -->
<footer class="mt-8 text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors opacity-70 hover:opacity-100" href="#">
                Request Archival Access
            </a>
</footer>
</main>
</body></html>
